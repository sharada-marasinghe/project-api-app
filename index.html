<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreeProjectAPI Dashboard</title>
  <meta name="description" content="A single-page application integrating 14 sandbox apps from FreeProjectAPI.com" />

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --sidebar-width: 270px;
      --sidebar-bg: #0d1117;
      --sidebar-border: #21262d;
      --accent: #58a6ff;
      --accent-glow: rgba(88,166,255,.15);
      --surface: #161b22;
      --surface2: #1c2128;
      --text-muted-custom: #8b949e;
      --success-custom: #3fb950;
      --danger-custom: #f85149;
      --warning-custom: #d29922;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      overflow-x: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      position: fixed;
      top: 0; left: 0;
      width: var(--sidebar-width);
      height: 100vh;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      display: flex;
      flex-direction: column;
      z-index: 1040;
      transition: transform .3s ease;
      overflow-y: auto;
    }

    #sidebar::-webkit-scrollbar { width: 4px; }
    #sidebar::-webkit-scrollbar-track { background: transparent; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--sidebar-border); border-radius: 2px; }

    .sidebar-brand {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--sidebar-border);
      flex-shrink: 0;
    }
    .sidebar-brand h5 {
      margin: 0;
      font-weight: 700;
      font-size: 1rem;
      background: linear-gradient(135deg, #58a6ff, #bc8cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .sidebar-brand small {
      color: var(--text-muted-custom);
      font-size: .7rem;
    }

    .sidebar-search {
      padding: .75rem 1rem;
      border-bottom: 1px solid var(--sidebar-border);
    }
    .sidebar-search input {
      background: var(--surface);
      border: 1px solid var(--sidebar-border);
      color: #e6edf3;
      font-size: .8rem;
      border-radius: 6px;
    }
    .sidebar-search input:focus {
      background: var(--surface);
      border-color: var(--accent);
      color: #e6edf3;
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .sidebar-search input::placeholder { color: var(--text-muted-custom); }

    .sidebar-section-label {
      padding: .5rem 1.25rem .25rem;
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-muted-custom);
    }

    .nav-item-custom {
      padding: 0 .75rem .15rem;
    }
    .nav-link-custom {
      display: flex;
      align-items: center;
      gap: .65rem;
      padding: .55rem .85rem;
      border-radius: 8px;
      color: #8b949e;
      font-size: .82rem;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: background .15s, color .15s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .nav-link-custom:hover {
      background: var(--surface);
      color: #e6edf3;
    }
    .nav-link-custom.active {
      background: var(--accent-glow);
      color: var(--accent);
      font-weight: 600;
    }
    .nav-link-custom .nav-icon {
      width: 18px;
      text-align: center;
      font-size: .9rem;
      flex-shrink: 0;
    }
    .nav-badge {
      margin-left: auto;
      font-size: .6rem;
      padding: .15rem .45rem;
      border-radius: 20px;
      background: var(--surface2);
      color: var(--text-muted-custom);
    }
    .nav-link-custom.active .nav-badge {
      background: var(--accent-glow);
      color: var(--accent);
    }

    /* ── Main content ── */
    #main-wrapper {
      margin-left: var(--sidebar-width);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #topbar {
      position: sticky;
      top: 0;
      background: rgba(13,17,23,.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--sidebar-border);
      padding: .75rem 1.75rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      z-index: 100;
    }
    #sidebar-toggle {
      display: none;
      background: none;
      border: none;
      color: #e6edf3;
      font-size: 1.25rem;
      cursor: pointer;
      padding: .25rem .5rem;
    }
    #topbar-title {
      font-weight: 600;
      font-size: .95rem;
      color: #e6edf3;
    }
    #topbar-breadcrumb {
      font-size: .75rem;
      color: var(--text-muted-custom);
    }
    .topbar-api-badge {
      margin-left: auto;
      font-size: .7rem;
      color: var(--text-muted-custom);
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    .api-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success-custom);
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; }
      50% { opacity: .3; }
    }

    #app-content {
      flex: 1;
      padding: 2rem 1.75rem;
    }

    /* ── Card Overrides ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--sidebar-border);
      border-radius: 12px;
    }
    .card-header {
      background: var(--surface2);
      border-bottom: 1px solid var(--sidebar-border);
      padding: .85rem 1.25rem;
    }
    .form-control, .form-select {
      background: var(--surface2);
      border: 1px solid var(--sidebar-border);
      color: #e6edf3;
      border-radius: 8px;
    }
    .form-control:focus, .form-select:focus {
      background: var(--surface2);
      border-color: var(--accent);
      color: #e6edf3;
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .form-control::placeholder { color: var(--text-muted-custom); }
    .form-select option { background: var(--surface2); }
    .form-label { font-size: .82rem; font-weight: 500; color: #8b949e; margin-bottom: .35rem; }

    .table { color: #e6edf3; }
    .table thead th {
      background: var(--surface2);
      color: var(--text-muted-custom);
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      border-bottom: 1px solid var(--sidebar-border);
      font-weight: 600;
    }
    .table tbody tr {
      border-bottom: 1px solid var(--sidebar-border);
      transition: background .15s;
    }
    .table tbody tr:hover { background: var(--surface2); }
    .table td { font-size: .82rem; vertical-align: middle; }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d1117;
      font-weight: 600;
      border-radius: 8px;
    }
    .btn-primary:hover { background: #79baff; border-color: #79baff; color: #0d1117; }
    .btn-outline-primary { border-color: var(--accent); color: var(--accent); border-radius: 8px; }
    .btn-outline-primary:hover { background: var(--accent-glow); color: var(--accent); }
    .btn-success { background: var(--success-custom); border-color: var(--success-custom); color: #0d1117; font-weight: 600; border-radius: 8px; }
    .btn-danger { background: var(--danger-custom); border-color: var(--danger-custom); font-weight: 600; border-radius: 8px; }
    .btn-warning { background: var(--warning-custom); border-color: var(--warning-custom); color: #0d1117; font-weight: 600; border-radius: 8px; }
    .btn-sm { border-radius: 6px !important; font-size: .75rem; }

    .badge { border-radius: 6px; font-weight: 500; font-size: .7rem; }

    .progress { background: var(--surface2); border-radius: 20px; }

    /* ── Parking grid ── */
    .parking-slot {
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      font-size: .75rem;
      font-weight: 600;
      border: 2px solid transparent;
    }
    .parking-slot:hover { transform: scale(1.04); }
    .parking-slot.vacant {
      background: rgba(63,185,80,.12);
      border-color: var(--success-custom);
      color: var(--success-custom);
    }
    .parking-slot.occupied {
      background: rgba(248,81,73,.12);
      border-color: var(--danger-custom);
      color: var(--danger-custom);
    }

    /* ── Step wizard ── */
    .step-indicator {
      display: flex;
      align-items: center;
      margin-bottom: 2rem;
    }
    .step-circle {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .75rem;
      font-weight: 700;
      border: 2px solid var(--sidebar-border);
      background: var(--surface2);
      color: var(--text-muted-custom);
      flex-shrink: 0;
    }
    .step-circle.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
    .step-circle.done { border-color: var(--success-custom); color: var(--success-custom); background: rgba(63,185,80,.12); }
    .step-line { flex: 1; height: 2px; background: var(--sidebar-border); margin: 0 .5rem; }
    .step-line.done { background: var(--success-custom); }
    .step-label { font-size: .7rem; color: var(--text-muted-custom); margin-top: .3rem; text-align: center; }

    /* ── Survey ── */
    .survey-option {
      border: 2px solid var(--sidebar-border);
      border-radius: 10px;
      padding: .75rem 1rem;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      font-size: .85rem;
    }
    .survey-option:hover, .survey-option.selected {
      border-color: var(--accent);
      background: var(--accent-glow);
      color: var(--accent);
    }

    /* ── Hero welcome ── */
    .hero-welcome {
      background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
      border: 1px solid var(--sidebar-border);
      border-radius: 16px;
      padding: 2.5rem;
      text-align: center;
    }
    .hero-welcome h2 {
      font-weight: 700;
      background: linear-gradient(135deg, #58a6ff, #bc8cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Stat cards ── */
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--sidebar-border);
      border-radius: 12px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: .4rem;
    }
    .stat-card .stat-value { font-size: 1.6rem; font-weight: 700; }
    .stat-card .stat-label { font-size: .75rem; color: var(--text-muted-custom); }
    .stat-card .stat-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      margin-bottom: .25rem;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      #sidebar { transform: translateX(calc(-1 * var(--sidebar-width))); }
      #sidebar.open { transform: translateX(0); box-shadow: 0 0 40px rgba(0,0,0,.5); }
      #main-wrapper { margin-left: 0; }
      #sidebar-toggle { display: block; }
      #app-content { padding: 1.25rem 1rem; }
    }

    /* ── Overlay for mobile ── */
    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 1039;
    }
    #sidebar-overlay.active { display: block; }

    /* ── Misc ── */
    .alert { border-radius: 10px; font-size: .83rem; }
    .modal-content { background: var(--surface); border: 1px solid var(--sidebar-border); }
    .modal-header { border-bottom-color: var(--sidebar-border); }
    .modal-footer { border-top-color: var(--sidebar-border); }

    .section-heading {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: .25rem;
    }
    .section-sub {
      font-size: .8rem;
      color: var(--text-muted-custom);
      margin-bottom: 1.5rem;
    }

    /* scrollbar for main */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--sidebar-border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- Mobile overlay -->
<div id="sidebar-overlay"></div>

<!-- ════════════════════════ SIDEBAR ════════════════════════ -->
<nav id="sidebar">
  <div class="sidebar-brand">
    <h5><i class="bi bi-grid-3x3-gap-fill me-2"></i>FreeProject<span style="-webkit-text-fill-color:#bc8cff;background:none">API</span></h5>
    <small>14 Sandbox Applications</small>
  </div>

  <div class="sidebar-search">
    <input id="sidebar-search-input" class="form-control form-control-sm" type="text" placeholder="&#xe8b6; Search apps…" />
  </div>

  <div class="mt-2 pb-3" id="nav-list">
    <div class="sidebar-section-label">Applications</div>

    <!-- Nav items injected by JS, but listed here as fallback / static for quick paint -->
    <div class="nav-item-custom"><button class="nav-link-custom active" data-app="home" onclick="switchApp('home')"><span class="nav-icon"><i class="bi bi-house-door"></i></span>Dashboard</button></div>
    <div class="nav-item-custom"><button class="nav-link-custom" data-app="bankloan" onclick="switchApp('bankloan')"><span class="nav-icon"><i class="bi bi-bank"></i></span>Bank Loan<span class="nav-badge">API</span></button></div>
    <div class="nav-item-custom"><button class="nav-link-custom" data-app="busbooking" onclick="switchApp('busbooking')"><span class="nav-icon"><i class="bi bi-bus-front"></i></span>Bus Booking<span class="nav-badge">API</span></button></div>
    <div class="nav-item-custom"><button class="nav-link-custom" data-app="collegeproject" onclick="switchApp('collegeproject')"><span class="nav-icon"><i class="bi bi-mortarboard"></i></span>College Project<span class="nav-badge">API</span></button></div>
    <div class="nav-item-custom"><button class="nav-link-custom" data-app="ecommerce" onclick="switchApp('ecommerce')"><span class="nav-icon"><i class="bi bi-cart3"></i></span>Ecommerce<span class="nav-badge">API</span></button></div>
    <div class="nav-item-custom"><button class="nav-link-custom" data-app="employeeapp" onclick="switchApp('employeeapp')"><span class="nav-icon"><i class="bi bi-people"></i></span>Employee App<span class="nav-badge">API</span></button></div>
    <div class="nav-item-custom"><button class="nav-link-custom" data-app="employeeonboarding" onclick="switchApp('employeeonboarding')"><span class="nav-icon"><i class="bi bi-person-check"></i></span>Onboarding<span class="nav-badge">API</span></button></div>
    <div class="nav-item-custom"><button class="nav-link-custom" data-app="enquiry" onclick="switchApp('enquiry')"><span class="nav-icon"><i class="bi bi-chat-dots"></i></span>Enquiry<span class="nav-badge">API</span></button></div>
    <div class="nav-item-custom"><button class="nav-link-custom" data-app="feestracking" onclick="switchApp('feestracking')"><span class="nav-icon"><i class="bi bi-cash-coin"></i></span>Fees Tracking<span class="nav-badge">API</span></button></div>
    <div class="nav-item-custom"><button class="nav-link-custom" data-app="goaltracker" onclick="switchApp('goaltracker')"><span class="nav-icon"><i class="bi bi-bullseye"></i></span>Goal Tracker<span class="nav-badge">API</span></button></div>
    <div class="nav-item-custom"><button class="nav-link-custom" data-app="leavetracker" onclick="switchApp('leavetracker')"><span class="nav-icon"><i class="bi bi-calendar-x"></i></span>Leave Tracker<span class="nav-badge">API</span></button></div>
    <div class="nav-item-custom"><button class="nav-link-custom" data-app="projectcompetition" onclick="switchApp('projectcompetition')"><span class="nav-icon"><i class="bi bi-trophy"></i></span>Competition<span class="nav-badge">API</span></button></div>
    <div class="nav-item-custom"><button class="nav-link-custom" data-app="smartparking" onclick="switchApp('smartparking')"><span class="nav-icon"><i class="bi bi-p-circle"></i></span>Smart Parking<span class="nav-badge">API</span></button></div>
    <div class="nav-item-custom"><button class="nav-link-custom" data-app="survey" onclick="switchApp('survey')"><span class="nav-icon"><i class="bi bi-card-checklist"></i></span>Survey<span class="nav-badge">API</span></button></div>
    <div class="nav-item-custom"><button class="nav-link-custom" data-app="userapp" onclick="switchApp('userapp')"><span class="nav-icon"><i class="bi bi-person-gear"></i></span>User App<span class="nav-badge">API</span></button></div>
  </div>

  <div class="mt-auto p-3 border-top" style="border-color:var(--sidebar-border)!important;font-size:.7rem;color:var(--text-muted-custom);">
    <i class="bi bi-link-45deg"></i> freeapi.gerocerymaster.in
  </div>
</nav>

<!-- ════════════════════════ MAIN ════════════════════════ -->
<div id="main-wrapper">
  <!-- Topbar -->
  <header id="topbar">
    <button id="sidebar-toggle" aria-label="Toggle sidebar"><i class="bi bi-list"></i></button>
    <div>
      <div id="topbar-title">Dashboard</div>
      <div id="topbar-breadcrumb">Home / Overview</div>
    </div>
    <div class="topbar-api-badge">
      <span class="api-dot"></span>
      <span id="api-status-label">API Connected</span>
    </div>
  </header>

  <!-- App content injected here -->
  <main id="app-content"></main>
</div>

<!-- ════════════════════════ BOOKING MODAL ════════════════════════ -->
<div class="modal fade" id="bookingModal" tabindex="-1" aria-labelledby="bookingModalLabel">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="bookingModalLabel"><i class="bi bi-bus-front me-2"></i>Confirm Booking</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="booking-modal-body"><!-- filled by JS --></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary btn-sm" id="confirm-booking-btn">Confirm Booking</button>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
